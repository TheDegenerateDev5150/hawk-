# Publish cargo-hawk to crates.io from the release workflow.
name: Publish to crates.io

on:
  workflow_call:

permissions: {}

jobs:
  cargo-publish:
    name: cargo publish
    timeout-minutes: 10
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - name: Install Rust toolchain
        run: rustup show
      - name: Publish cargo-hawk
        run: cargo publish --locked --package cargo-hawk
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
