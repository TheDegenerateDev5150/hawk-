name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string

permissions: {}

jobs:
  validate:
    name: Validate release
    if: ${{ github.repository == 'astral-sh/hawk' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Validate tag and changelog
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          manifest = tomllib.loads(Path("Cargo.toml").read_text())
          version = manifest["package"]["version"]
          if tag != version:
              raise SystemExit(f"release tag {tag!r} does not match package version {version!r}")

          changelog = Path("CHANGELOG.md").read_text()
          if f"## {tag}\n" not in changelog:
              raise SystemExit(f"CHANGELOG.md does not contain an entry for {tag}")
          PY

  publish-crates:
    needs: validate
    uses: ./.github/workflows/publish-crates.yml
    permissions:
      contents: read
      id-token: write

  announce:
    name: Create GitHub release
    needs:
      - validate
      - publish-crates
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Create release notes
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          changelog = Path("CHANGELOG.md").read_text()
          start = changelog.index(f"## {tag}\n") + len(f"## {tag}\n")
          end = changelog.find("\n## ", start)
          entry = changelog[start:] if end == -1 else changelog[start:end]
          notes = f"## Release Notes\n{entry.rstrip()}\n"
          Path(os.environ["RUNNER_TEMP"], "release-notes.md").write_text(notes)
          PY
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          prerelease=()
          if [[ "$RELEASE_TAG" == *-* ]]; then
            prerelease+=(--prerelease)
          fi
          gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            "${prerelease[@]}"
