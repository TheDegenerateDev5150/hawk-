[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The generated workflow is hardened locally for the repository's zizmor policy.
allow-dirty = ["ci"]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# Ship prebuilt cargo-hawk binary archives without additional package-manager installers.
installers = []
# Publish only the cargo-hawk package to crates.io after release artifacts are hosted.
publish-jobs = ["./publish-crates"]
# The crates.io publisher authenticates through GitHub OIDC.
github-custom-job-permissions = { "publish-crates" = { contents = "read", id-token = "write" } }
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]

[dist.github-action-commits]
"actions/checkout" = "de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
"actions/upload-artifact" = "043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
"actions/download-artifact" = "3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
